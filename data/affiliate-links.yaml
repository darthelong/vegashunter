# Affiliate links — referenced by id from review frontmatter.
# Edit url, swap network, deactivate — propagation is automatic.
#
# Template tokens in the URL are filled at request-render time:
#   {sub1}    — page type:    'review' | 'ranking' | 'blog'
#   {sub2}    — page slug:    e.g. 'slotoro-bewertung'
#   {clickid} — set by the affiliate network on redirect; we never fill this
#
# Sprint 1 ships placeholders. Replace with real network URLs when contracts
# are signed and trackers are received from the Product Owner.

- id: slotoro-de
  url: "https://track.example.com/click?campaign=slotoro&geo=de&sub1={sub1}&sub2={sub2}"
  notes: "DE deal · EUR · placeholder"
  active: true

- id: slotoro-en
  url: "https://track.example.com/click?campaign=slotoro&geo=en&sub1={sub1}&sub2={sub2}"
  notes: "EN/global · placeholder"
  active: true

- id: slotoro-mx
  url: "https://track.example.com/click?campaign=slotoro&geo=mx&sub1={sub1}&sub2={sub2}"
  notes: "MX deal · MXN · placeholder"
  active: true
