# VegasHunter — locale registry (single source of truth)
#
# When adding a locale here, you MUST also:
#   1. Add it to LOCALES + HREFLANG_MAP in astro.config.mjs
#   2. Create i18n/{code}.json with ALL UI string keys
#   3. Add review path segment in `paths.reviews` below
#   4. Translate footer disclosure in `disclosure` below
#
# Build will fail (Zod validation) if any of the above is missing.

- code: en
  name: English
  hreflang: en
  is_default: true
  is_x_default: true
  market_scope: global
  currency_default: USD
  status: active
  paths:
    reviews: reviews
    blog: blog
    providers: providers
    slots: slots
    payment_methods: payment-methods
    bonuses: bonuses
    authors: authors
    methodology: methodology

