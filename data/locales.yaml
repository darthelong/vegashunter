# VegasHunter — locale registry (single source of truth)
#
# When adding a locale here, you MUST also:
#   1. Create i18n/{code}.json with ALL UI string keys
#   2. Add review path segment in `paths.reviews` below
#   3. Translate footer disclosure (handled in i18n strings)
#
# Build will fail (Zod validation) if any of the above is missing.
#
# Switcher visibility model:
#   - `visible_in_switcher: true`  → shown in the language dropdown (5 base languages)
#   - `visible_in_switcher: false` → hidden, but still buildable + sitemap-indexed.
#                                    Auto-activated for users from `country_codes`
#                                    via the CF Pages middleware (regional redirect).
#   - `regional_of`  → which base locale this is a regional variant of (used by
#                      the middleware to know what to redirect /en/ → /en-ca/ etc.)
#   - `country_codes`→ ISO 3166-1 alpha-2 codes that auto-redirect to this regional.

- code: en
  name: English
  hreflang: en
  is_default: true
  is_x_default: true
  visible_in_switcher: true
  market_scope: global
  currency_default: USD
  status: active
  paths:
    reviews: reviews
    blog: blog
    providers: providers
    slots: slots
    payment_methods: payment-methods
    bonuses: bonuses
    authors: authors
    methodology: methodology

- code: en-ca
  name: English (Canada)
  hreflang: en-CA
  visible_in_switcher: false
  regional_of: en
  country_codes: [CA]
  market_scope: ca
  currency_default: CAD
  status: active
  paths: { reviews: reviews, blog: blog, providers: providers, slots: slots, payment_methods: payment-methods, bonuses: bonuses, authors: authors, methodology: methodology }

