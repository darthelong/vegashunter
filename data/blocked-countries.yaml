# Geo-block list — countries that are denied access to the site.
#
# Codes are ISO 3166-1 alpha-2. Reads against the `CF-IPCountry` request header
# on Cloudflare Pages (functions/_middleware.ts).
#
# History:
#   2026-04-27 — initial: PL, US, AU, FR
#   2026-04-29 — US lifted (en-us locale activated for US visitors).
#                Per-state US restrictions handled at content level if needed.
#
# Add countries by appending; never inline-comment a code (parser is strict).
# Reason field is documentation only — not enforced.

blocked:
  - code: PL
    reason: "no PL gambling advertising without local license"
  - code: AU
    reason: "Interactive Gambling Act 2001 restrictions"
  - code: FR
    reason: "would require ARJEL license — out of scope"
